<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frameyaad - The Future of Custom Wall Art</title>
    <meta name="description"
        content="We help you turn memories into beautifully framed art. Join the Frameyard waitlist.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config for tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#D4A24E',
                            dark: '#050505',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-brand-dark text-white overflow-hidden h-screen w-screen m-0 p-0 font-sans">

    <!-- Background Video -->
    <div class="absolute inset-0 w-full h-full z-0 bg-brand-dark">
        <video class="absolute inset-0 w-full h-full object-cover" autoplay loop muted playsinline
            poster="https://images.unsplash.com/photo-1513519245088-0e12902e5a38?q=80&w=2070&auto=format&fit=crop"
            aria-label="Background video of beautiful framed art">
            <source src="Woman_decorating_empty_wall_202607201700.mp4" type="video/mp4">
            <!-- Fallback text if video fails -->
        </video>
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/55"></div>
    </div>

    <!-- Content -->
    <main class="relative z-10 w-full h-full flex flex-col items-center justify-center px-4 sm:px-6 lg:px-8">
        <!-- Logo -->
        <div class="absolute top-6 left-6 md:top-8 md:left-8">
            <h1 class="text-xl md:text-2xl font-semibold tracking-widest uppercase text-white/90 animate-fade-in">
                Frameyaad
            </h1>
        </div>

        <!-- Main Copy -->
        <div class="max-w-3xl text-center flex flex-col items-center mt-8">
            <h2
                class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold font-serif mb-4 sm:mb-6 leading-tight animate-fade-in-up delay-100">
                The Future of <span class="text-brand-gold">Custom Wall Art</span>
            </h2>

            <p
                class="text-base sm:text-lg md:text-xl md:text-2xl text-gray-200 mb-3 sm:mb-4 animate-fade-in-up delay-200 font-light">
                We help you turn memories into beautifully framed art.
            </p>

            <p
                class="text-sm sm:text-base md:text-lg text-gray-300 italic tracking-wide mb-6 sm:mb-10 animate-fade-in-up delay-300">
                See it. Feel it. Live it.
            </p>

            <!-- CTA Section -->
            <div class="flex flex-col items-center animate-fade-in-up delay-400 w-full max-w-md">
                <p class="text-sm text-gray-400 mb-3 uppercase tracking-wider">Before you order.</p>

                <!-- Initial CTA Button -->
                <button id="cta-btn"
                    class="group relative px-8 py-4 bg-brand-gold text-brand-dark font-semibold rounded-full text-lg transition-all duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(212,162,78,0.5)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-gold focus:ring-offset-brand-dark min-h-[44px] flex items-center justify-center glow-pulse"
                    aria-label="Join Waitlist">
                    <span>Join Waitlist</span>
                </button>

                <!-- Email Form (Hidden initially) -->
                <form id="waitlist-form"
                    class="hidden w-full flex-col sm:flex-row gap-3 transition-all duration-500 opacity-0 transform translate-y-4">
                    <div class="relative flex-grow">
                        <input type="email" id="email-input" required placeholder="Enter your email address"
                            class="w-full px-6 py-4 rounded-full bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-gold focus:border-transparent backdrop-blur-sm min-h-[44px]"
                            aria-label="Email address">
                    </div>
                    <button type="submit" id="submit-btn"
                        class="px-8 py-4 bg-brand-gold text-brand-dark font-semibold rounded-full hover:bg-brand-gold/90 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-gold focus:ring-offset-brand-dark min-h-[44px] flex items-center justify-center disabled:opacity-70 disabled:cursor-not-allowed whitespace-nowrap">
                        <span>Submit</span>
                        <!-- Loading spinner (hidden) -->
                        <svg id="loading-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-brand-dark"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </button>
                </form>

                <!-- Success Message -->
                <div id="success-msg"
                    class="hidden mt-4 text-green-400 flex items-center gap-2 bg-green-400/10 px-4 py-2 rounded-full backdrop-blur-sm animate-fade-in">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    You're on the list!
                </div>

                <!-- Error Message -->
                <div id="error-msg" class="hidden mt-4 text-red-400 text-sm animate-fade-in">
                    Something went wrong. Please try again.
                </div>
            </div>

            <!-- Social Proof Counter -->
            <div class="mt-8 sm:mt-12 animate-fade-in-up delay-500">
                <div
                    class="inline-flex items-center gap-2 bg-white/5 border border-white/10 rounded-full px-4 py-2 backdrop-blur-md text-sm text-gray-300">
                    <span class="text-lg">👀</span>
                    <span id="watcher-count" class="font-semibold text-brand-gold transition-all duration-300">0</span>
                    <span>people watching</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
